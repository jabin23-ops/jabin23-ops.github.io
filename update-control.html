const BR = (P.bridge && P.bridge.url) ? P.bridge : null;
const DAY = 86400000;

let SN = {};   // roleKey -> snooze-until ISO
let MK = {};   // roleKey -> {at, by}

function esc(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function parseDate(iso){ if(!iso) return null; const d=new Date(iso); d.setHours(0,0,0,0); return d; }
function daysBetween(a,b){ return Math.floor((b-a)/DAY); }
function fmt(d){ return d? d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—'; }
function rel(n){ if(n===0) return 'today'; if(n===1) return 'yesterday'; if(n<0) return 'in '+(-n)+'d'; return n+' days ago'; }
function graceFor(iv){ return Math.max(1, Math.round(iv*0.2)); }
function lsGet(k,d){ try{const v=localStorage.getItem(k); return v?JSON.parse(v):d;}catch(e){return d;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
function operator(){ let o=localStorage.getItem('uc_operator'); if(!o){ o=(prompt('Your name (for the update log):','')||'').trim()||'—'; localStorage.setItem('uc_operator',o);} return o; }
function getDl(){ return lsGet('uc_dl',{}); }
function toggleDl(rk,el){ const d=getDl(); if(el.checked) d[rk]=1; else delete d[rk]; lsSet('uc_dl',d); }
function clearDl(){ lsSet('uc_dl',{}); render(); }

const CADLBL={weekly:'weekly',tenday:'10-day',biweekly:'2-weekly',monthly:'monthly',reference:'reference'};

function snoozedTill(rk){ const u=SN[rk]; if(!u) return null; const d=new Date(u); return d>today ? d : null; }
function pending(rk){ const m=MK[rk]; return m && new Date(m.at) > new Date(P.built); }

function statusOf(r){
  if(snoozedTill(r.roleKey)) return {cls:'grey', txt:'snoozed', order:4, muted:true};
  if(!r.present) return {cls:'red', txt:'MISSING', order:0};
  if(r.cadence==='reference') return {cls:'grey', txt:'reference', order:5};
  const lc=parseDate(r.last_changed), age=daysBetween(lc,today), iv=r.interval, g=graceFor(iv);
  if(age > iv+g) return {cls:'red',   txt:'OVERDUE '+(age-iv)+'d', order:1};
  if(age >= iv-1) return {cls:'amber', txt:'DUE NOW', order:2};
  return {cls:'green', txt:'on track', order:3};
}

function isBiweeklyThu(t){ return daysBetween(parseDate(P.biweekly_anchor), t)%14===0; }

function brPost(key,value){
  if(!BR) return;
  fetch(BR.url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({token:BR.token,key:key,value:value})}).catch(function(){});

  if(!BR){ SN=lsGet('uc_snooze',{}); MK=lsGet('uc_mark',{}); done(); return; }

    const d=(j&&j.data)||{}; SN={}; MK={};
    Object.keys(d).forEach(function(k){
      if(k.indexOf('uc.snooze.')===0){ if(d[k]) SN[k.slice(10)]=d[k]; }

        let v=d[k]; try{v=JSON.parse(v);}catch(e){return;}
        const rk=v.roleKey; if(!rk) return;
        if(!MK[rk] || new Date(v.at)>new Date(MK[rk].at)) MK[rk]={at:v.at,by:v.by||'—'};
      }
    });
    done();
  }).catch(function(){ SN=lsGet('uc_snooze',{}); MK=lsGet('uc_mark',{}); done(); });

function snooze(rk){ const until=new Date(today.getTime()+10*DAY).toISOString(); SN[rk]=until;

function wake(rk){ delete SN[rk]; BR?brPost('uc.snooze.'+rk,''):lsSet('uc_snooze',SN); render(); }

  } else pe.style.display='none';

  const byApp={}; need.forEach(function(r){(byApp[r.app]=byApp[r.app]||[]).push(r);});
  document.getElementById('due').innerHTML='<b>📥 To export by Thursday ('+lbl+')</b> — '+need.length+' files'+
    (bw?' · incl. creditor (2-wk)':'')+(fm?' · incl. monthly registers':'')+
    '<ul>'+Object.keys(byApp).map(function(a){return '<li><b>'+a+':</b> '+
      byApp[a].map(function(r){return r.role+(r.branch?' ('+r.branch+')':'');}).join(', ')+'</li>';}).join('')+'</ul>';

  // app cards
  const order=['Stock Checker','Debtor','Creditor','Stock Intelligence'];
  const groups={}; P.rows.forEach(function(r){(groups[r.app]=groups[r.app]||[]).push(r);});
  let out='';
  order.forEach(function(app){
    const rs=(groups[app]||[]).slice().sort(function(a,b){return statusOf(a).order-statusOf(b).order;});
    if(!rs.length) return;
    const live=rs.filter(function(r){return r.cadence!=='reference';}).length;
    out+='<div class="appcard"><h2>'+app+'<span class="cnt">'+live+' tracked</span></h2>'+
      '<table><thead><tr><th>Item</th><th>File</th><th>Cadence</th><th>Last updated</th><th>Status</th><th>Actions</th><th>Got&nbsp;it</th></tr></thead><tbody>';
    rs.forEach(function(r){
      const s=statusOf(r), lc=parseDate(r.last_changed), age=lc?daysBetween(lc,today):null;
      const when=r.present&&lc?('<b>'+fmt(lc)+'</b> · '+rel(age)):'—';
      const sh=r.shared?'<div class="shared">↔ '+r.shared+'</div>':'';
      const snU=snoozedTill(r.roleKey);
      let extra=''; if(pending(r.roleKey)) extra+='<div class="pend">✓ marked by '+MK[r.roleKey].by+'</div>';
      if(snU) extra+='<div class="snz">snoozed till '+fmt(snU)+'</div>';
      let act='';
      if(r.cadence!=='reference'){
        act+=snU?'<button class="btn wake" onclick="wake(\''+r.roleKey+'\')">Wake</button>'
                :'<button class="btn snooze" onclick="snooze(\''+r.roleKey+'\')">Snooze 10d</button>';
        act+='<button class="btn mark" onclick="mark(\''+r.roleKey+'\',\''+esc(r.role)+'\',\''+esc(r.filename)+'\')">Mark updated</button>';
      } else act='—';
      const dlb = r.cadence!=='reference'
        ? '<input type="checkbox" class="dlbox" '+(DL[r.roleKey]?'checked':'')+' onchange="toggleDl(\''+r.roleKey+'\',this)" title="Tick when downloaded from Tally">'
        : '';
      out+='<tr class="'+(s.muted?'muted':'')+'">'+
        '<td class="role">'+r.role+(r.branch?' <span class="br">· '+r.branch+'</span>':'')+sh+'</td>'+
        '<td class="fn" title="'+r.filename+'">'+r.filename+'</td>'+
        '<td><span class="cad">'+(CADLBL[r.cadence]||r.cadence)+'</span></td>'+
        '<td class="when">'+when+'</td>'+
        '<td><span class="pill '+s.cls+'">'+s.txt+'</span>'+extra+'</td>'+
        '<td>'+act+'</td>'+
        '<td style="text-align:center">'+dlb+'</td></tr>';
    });
    out+='</tbody></table></div>';
  });
  document.getElementById('apps').innerHTML=out;
}

function tick(){ document.getElementById('clock').textContent =
  new Date().toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
tick(); setInterval(tick,30000);

const builtD=new Date(P.built);
document.getElementById('foot').innerHTML =
 'Status is recomputed in your browser each time you open this page. '+
 '“Last updated” changes only when a file’s <b>contents</b> change — opening a file to view it never affects it.<br>'+
 (BR?'Snooze &amp; Mark-updated sync online via the shared bridge.':'<span class="off">Offline mode — snooze/mark saved on this device only (no bridge configured).</span>')+'<br>'+
 'The “Got it” ticks are a private download checklist (this device only) — <span class="clrlink" onclick="clearDl()">clear all ticks</span> when you start a new batch.<br>'+
 'Snapshot rebuilt: '+builtD.toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+'.';

brLoad(render);
</script></body></html>
